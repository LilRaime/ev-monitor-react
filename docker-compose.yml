services:
  backend:
    build: 
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
